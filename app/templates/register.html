<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish - Velora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { primary: '#4f46e5', 'primary-hover': '#4338ca' }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
    </style>
</head>
<body class="bg-white dark:bg-gray-950 text-gray-800 dark:text-gray-200 font-sans min-h-screen">

    <div class="flex min-h-screen flex-row-reverse">
        <!-- Right Pane (Branding - hidden on mobile) -->
        <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-bl from-indigo-600 via-purple-600 to-indigo-900 items-center justify-center p-12 relative overflow-hidden">
            <div class="absolute top-[10%] right-[-10%] w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-[100px] opacity-50"></div>
            <div class="absolute bottom-[10%] left-[-10%] w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-50"></div>

            <div class="z-10 text-white text-center max-w-md backdrop-blur-md bg-white/10 p-10 rounded-3xl border border-white/20 shadow-2xl">
                <h2 class="text-4xl font-bold mb-4 tracking-tight">Katta oilamizga qo'shiling</h2>
                <p class="text-indigo-100 text-lg leading-relaxed">Ro'yxatdan o'ting va faqat a'zolar uchun maxsus chegirmalarga ega bo'ling.</p>
                <div class="flex justify-center gap-2 mt-8">
                    <div class="w-12 h-1 bg-white/40 rounded-full"></div>
                    <div class="w-12 h-1 bg-white rounded-full"></div>
                    <div class="w-12 h-1 bg-white/40 rounded-full"></div>
                </div>
            </div>
        </div>

        <!-- Left Pane (Form) -->
        <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 relative">

            <button id="darkModeToggle" class="absolute top-6 right-6 lg:left-6 lg:right-auto p-2.5 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors border border-transparent dark:border-gray-800">
                <i class="ph ph-moon text-xl dark:hidden"></i>
                <i class="ph ph-sun text-xl hidden dark:block"></i>
            </button>

            <div class="w-full max-w-md">
                <div class="flex items-center gap-2 mb-8 lg:hidden text-primary">
                    <img src="logo.svg" alt="Velora logo" class="w-10 h-10 rounded-2xl">
                    <span class="text-2xl font-bold dark:text-white tracking-tight">Velora</span>
                </div>

                <div class="mb-8">
                    <h1 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white">Hisob yaratish ✨</h1>
                    <p class="text-gray-500 dark:text-gray-400">Xaridlarni boshlash uchun ro'yxatdan o'ting.</p>
                </div>

                <form action="{% url 'register' %}" method="post" class="space-y-4">
                    {% csrf_token %}

                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">To'liq ism</label>
                        <div class="relative">
                            <i class="ph ph-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input name="first_name" type="text" required placeholder="Shaxriyor" class="w-full bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-gray-400">
                        </div>
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Email manzil</label>
                        <div class="relative">
                            <i class="ph ph-envelope-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input name="email" type="email" required placeholder="nom@misol.uz" class="w-full bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-gray-400">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Parol</label>
                        <div class="relative">
                            <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input name="password1" type="password" id="regPassword" required placeholder="Min 8 ta belgi" class="w-full bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-gray-400">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Parol</label>
                        <div class="relative">
                            <i class="ph ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg"></i>
                            <input name="password2" type="password" id="regPassword" required placeholder="Min 8 ta belgi" class="w-full bg-white dark:bg-gray-900 dark:text-white border border-gray-300 dark:border-gray-700 rounded-xl pl-11 pr-4 py-3 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-gray-400">
                        </div>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white rounded-xl py-3.5 font-semibold transition-all shadow-lg shadow-primary/30 active:scale-[0.98] mt-6">
                        Ro'yxatdan o'tish
                    </button>
                </form>

                <div class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                    Allaqachon hisobingiz bormi?
                    <a href="{% url 'login' %}" class="font-semibold text-primary hover:text-primary-hover transition-colors">Tizimga kirish</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const applyDarkMode = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        };

        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });
        applyDarkMode();

    </script>
</body>
</html>
